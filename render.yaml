services:
  - type: web
    name: aiss-project
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: OPENAI_API_KEY
        sync: false
      - key: AZURE_SQL_SERVER
        sync: false
      - key: AZURE_SQL_DATABASE
        value: AISSDB
      - key: AZURE_SQL_USER
        sync: false
      - key: AZURE_SQL_PASSWORD
        sync: false
      - key: AZURE_SQL_ENCRYPT
        value: "true"
      - key: AZURE_SQL_TRUST_SERVER_CERTIFICATE
        value: "false"
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT_GPT_5_4
        sync: false
      - key: AZURE_OPENAI_DEPLOYMENT_GPT_5_4_MINI
        sync: false
      - key: CATALOG_SYNC_ENABLED
        value: "false"
      - key: CATALOG_SYNC_ON_STARTUP
        value: "false"
      - key: CATALOG_SYNC_INTERVAL_MINUTES
        value: "4320"
